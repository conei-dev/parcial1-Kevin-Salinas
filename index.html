<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>TechStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand">TechStore</a>

            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="#productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <header class="container mt-4">
        <h1>Bienvenidos a TechStore</h1>
        <p id="descripcion">La mejor tienda de tecnología.</p>

        <button class="btn btn-primary" onclick="cambiarTexto()">Cambiar texto</button>
        <button class="btn btn-secondary" onclick="modoOscuro()">Modo oscuro</button>
    </header>

    <section class="container mt-5" id="productos">

        <h2>Productos</h2>

        <div class="row">

            <div class="col-md-4">
                <img src="img/laptop.jpg" alt="Imagen de una laptop gamer" class="img-fluid">
                <h4>Laptop Gamer</h4>
                <p>Potente laptop para juegos</p>
                <button class="btn btn-success" onclick="agregarCarrito()">Agregar</button>
            </div>

            <div class="col-md-4">
                <img src="img/mouse.jpg" alt="imagen de un mouse gamer" class="img-fluid">
                <h4>Mouse Gamer</h4>
                <p>Alta precisión</p>
                <button class="btn btn-success" onclick="agregarCarrito()">Agregar</button>
            </div>

        </div>
    </section>

    <section class="container mt-5" id="contacto">

        <h2>Contacto</h2>

        <form id="formContacto">

           
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Nombre" class="form-control mb-2">

            <label for="edad">Edad:</label>
            <input type="number" id="edad" placeholder="Edad" class="form-control mb-2">

            <label for="genero">Genero:</label>
            <input type="text" id="genero" placeholder="genero" class="form-control mb-2">

            <label for="Direccion">Direccion:</label>
            <input type="text" id="Direccion" placeholder="Direccion" class="form-control mb-2">

            <label for="correo">Correo:</label>
            <input type="email" id="correo" placeholder="Correo" class="form-control mb-2">

            <label for="Telefono">Telefono:</label>
            <input type="tel" id="Telefono" placeholder="Telefono" class="form-control mb-2">

            <button class="btn btn-primary" onclick="enviarFormulario()">Enviar</button>

        </form>

    </section>

    <script src="js/script.js"></script>
</body>

</html>
